<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP Cost Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #F5F9FF;
            color: #0A3D62;
        }
        .text-primary {
            color: #0A85EA;
        }
        .text-dark {
            color: #0A3D62;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-10">
        <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-8">
            <h1 class="text-2xl font-bold text-dark mb-3">CP Cost Estimator</h1>
            <p class="text-dark mb-6">Baseline sizing inputs for CP cost estimation.</p>

            <div class="mb-8 border border-gray-200 rounded-lg p-4">
                <h2 class="text-lg font-semibold text-dark mb-3">Cluster Setup</h2>
                <div class="flex flex-col sm:flex-row gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm text-dark mb-1" for="cluster-count">Number of clusters</label>
                        <input id="cluster-count" type="number" min="1" value="1" class="w-full border border-gray-300 rounded px-3 py-2">
                    </div>
                    <button id="generate-clusters" class="bg-primary text-white px-4 py-2 rounded hover:bg-dark">Generate</button>
                </div>
                <div id="clusters-container" class="mt-4 space-y-4"></div>
            </div>

            <div id="tables-container" class="space-y-6 mb-6"></div>
            <a href="index.html" class="text-primary underline">← Back to Landing Page</a>
        </div>
    </div>

    <script>
        const clusterCountInput = document.getElementById('cluster-count');
        const generateButton = document.getElementById('generate-clusters');
        const clustersContainer = document.getElementById('clusters-container');
        const tablesContainer = document.getElementById('tables-container');
        const services = [
            { name: 'Zookeeper or KRaft Nodes', nonProd: 0, prod: 0 },
            { name: 'Zookeeper or KRaft Nodes Across 2 DC', nonProd: 5, prod: 5 },
            { name: 'Kafka Broker', nonProd: 3, prod: 4 },
            { name: 'Kafka Broker - Across 2 DC', nonProd: 3, prod: 6 },
            { name: 'Schema Registry', nonProd: 1, prod: 2 },
            { name: 'Replicator', nonProd: 0, prod: 0 },
            { name: 'REST Proxy', nonProd: 0, prod: 0 },
            { name: 'ksqlDB (2 prod/1 Non Prod)', nonProd: 0, prod: 0 },
            { name: 'Kafka Connect (2 prod/1 Non Prod)', nonProd: 0, prod: 0 },
            { name: 'Control Center', nonProd: 1, prod: 1 },
            { name: 'Confluent Operator', nonProd: 1, prod: 1 },
            { name: 'CP Flink Nodes', nonProd: 3, prod: 3 }
        ];

        const renderClusters = () => {
            const count = Math.max(1, Number(clusterCountInput.value) || 1);
            clustersContainer.innerHTML = '';
            tablesContainer.innerHTML = '';

            for (let i = 0; i < count; i += 1) {
                const wrapper = document.createElement('div');
                wrapper.className = 'border border-gray-100 rounded-lg p-4 bg-gray-50';

                wrapper.innerHTML = `
                    <div class="flex flex-col sm:flex-row gap-4 items-end">
                        <div class="flex-1">
                            <label class="block text-sm text-dark mb-1">Cluster name</label>
                            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="e.g., prod-cluster-1">
                        </div>
                        <div class="w-full sm:w-48">
                            <label class="block text-sm text-dark mb-1">Environment</label>
                            <select class="w-full border border-gray-300 rounded px-3 py-2 env-select">
                                <option value="prod">Production</option>
                                <option value="nonprod">Non Production</option>
                            </select>
                        </div>
                    </div>
                `;

                clustersContainer.appendChild(wrapper);

                const tableWrapper = document.createElement('div');
                tableWrapper.className = 'bg-white shadow-lg rounded-lg p-4 border border-gray-100';
                tableWrapper.innerHTML = `
                    <h3 class="text-lg font-semibold text-dark mb-3 cluster-title">Cluster ${i + 1} Configuration</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left border border-gray-200">
                            <thead class="bg-gray-50 text-dark">
                                <tr>
                                    <th class="px-4 py-2 border">Services</th>
                                    <th class="px-4 py-2 border value-col">Non Prod</th>
                                    <th class="px-4 py-2 border value-col">PROD</th>
                                    <th class="px-4 py-2 border">Enable</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${services.map(service => `
                                    <tr>
                                        <td class="px-4 py-2 border">${service.name}</td>
                                        <td class="px-4 py-2 border nonprod-col">${service.nonProd}</td>
                                        <td class="px-4 py-2 border prod-col">${service.prod}</td>
                                        <td class="px-4 py-2 border text-center">
                                            <input type="checkbox" class="service-toggle">
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                tablesContainer.appendChild(tableWrapper);

                const envSelect = wrapper.querySelector('.env-select');
                const nameInput = wrapper.querySelector('input[type="text"]');
                const titleEl = tableWrapper.querySelector('.cluster-title');
                const nonProdCols = tableWrapper.querySelectorAll('.nonprod-col, .value-col:nth-child(2)');
                const prodCols = tableWrapper.querySelectorAll('.prod-col, .value-col:nth-child(3)');

                const updateColumns = () => {
                    const isProd = envSelect.value === 'prod';
                    nonProdCols.forEach(col => col.style.display = isProd ? 'none' : '');
                    prodCols.forEach(col => col.style.display = isProd ? '' : 'none');
                };

                const updateTitle = () => {
                    const name = nameInput.value.trim();
                    titleEl.textContent = name ? `${name} Configuration` : `Cluster ${i + 1} Configuration`;
                };

                envSelect.addEventListener('change', updateColumns);
                nameInput.addEventListener('input', updateTitle);
                updateColumns();
                updateTitle();
            }
        };

        generateButton.addEventListener('click', renderClusters);
        clusterCountInput.addEventListener('change', renderClusters);

        renderClusters();
    </script>
</body>
</html>
